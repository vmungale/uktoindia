<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chasing Dreams: My Car Journey from London to Mumbai</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      background: #111827;
      color: #f9fafb;
      font-family: Arial, sans-serif;
    }

    .reader-header {
      text-align: center;
      padding: 18px 12px;
      background: #0f172a;
      border-bottom: 1px solid #334155;
    }

    .reader-header h1 {
      margin: 0;
      font-size: 24px;
    }

    .reader-header p {
      margin: 8px 0 0;
      color: #cbd5e1;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #1e293b;
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #334155;
    }

    .toolbar button {
      padding: 10px 16px;
      margin: 4px;
      border: none;
      border-radius: 6px;
      background: #f59e0b;
      color: #111827;
      font-weight: bold;
      cursor: pointer;
    }

    .toolbar button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #pageInfo {
      margin: 0 12px;
      font-weight: bold;
    }

    #status {
      text-align: center;
      padding: 30px;
      font-size: 18px;
    }

    .canvas-wrap {
      position: relative;
      max-width: 1100px;
      margin: 20px auto;
      background: #0f172a;
      padding: 10px;
    }

    canvas {
      display: block;
      margin: auto;
      max-width: 100%;
      height: auto;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .watermark {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(-25deg);
      color: rgba(0, 0, 0, 0.18);
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
      z-index: 5;
    }

    .footer-link {
      text-align: center;
      padding: 20px;
    }

    .footer-link a {
      color: #fbbf24;
    }

    @media (max-width: 700px) {
      .reader-header h1 {
        font-size: 19px;
      }

      .watermark {
        font-size: 15px;
        white-space: normal;
        width: 90%;
      }

      .toolbar button {
        padding: 9px 12px;
      }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
</head>

<body oncontextmenu="return false;">

  <div class="reader-header">
    <h1>Chasing Dreams: My Car Journey from London to Mumbai</h1>
    <p>Protected online reader</p>
  </div>

  <p id="status">Checking your access...</p>

  <div id="readerArea" style="display:none;">
    <div class="toolbar">
      <button id="prevPage">Previous</button>
      <span id="pageInfo">Page 1</span>
      <button id="nextPage">Next</button>
    </div>

    <div class="canvas-wrap">
      <canvas id="pdfCanvas"></canvas>
      <div id="watermark" class="watermark"></div>
    </div>
  </div>

  <div class="footer-link">
    <a href="index.html">Back to home</a>
  </div>

  <script type="module" src="reader.js"></script>
</body>
</html>
